{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block auth_content %}
<div class="auth-wrapper py-5">
    <div class="auth-card px-3 text-center">
        <div class="auth-logo mb-4"><i class="bi bi-shield-lock-fill"></i> AuthKit</div>
        <div class="card border-0 shadow-sm p-5" style="border-radius:16px">
            <div class="display-1 mb-3">📧</div>
            <h4 class="fw-700 mb-2">Check your email</h4>
            <p class="text-muted mb-4">We've sent password reset instructions to your email address. Check your inbox (and spam folder).</p>
            <a href="{% url 'login' %}" class="btn btn-primary">Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
