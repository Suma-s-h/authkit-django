{% extends 'base.html' %}
{% block title %}Logout{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card p-5">
            <div class="display-1 mb-3">👋</div>
            <h4 class="fw-700 mb-2">Sign out?</h4>
            <p class="text-muted mb-4">Are you sure you want to sign out of your account?</p>
            <div class="d-flex gap-3 justify-content-center">
                <form method="post" action="{% url 'logout' %}">{% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Sign Out</button>
                </form>
                <a href="{% url 'dashboard' %}" class="btn btn-light px-4">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
