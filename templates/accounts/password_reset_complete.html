{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block auth_content %}
<div class="auth-wrapper py-5">
    <div class="auth-card px-3 text-center">
        <div class="auth-logo mb-4"><i class="bi bi-shield-lock-fill"></i> AuthKit</div>
        <div class="card border-0 shadow-sm p-5" style="border-radius:16px">
            <div class="display-1 mb-3">✅</div>
            <h4 class="fw-700 mb-2">Password Reset!</h4>
            <p class="text-muted mb-4">Your password has been set. You can now sign in with your new password.</p>
            <a href="{% url 'login' %}" class="btn btn-primary">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
